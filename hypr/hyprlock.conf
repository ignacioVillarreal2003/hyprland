# ────────────────────────────────────────────────────────────
#  Hyprlock — Tokyo Night, minimal blur with ringed input
# ────────────────────────────────────────────────────────────

general {
    disable_loading_bar = true
    no_fade_in = false
}

background {
    monitor =
    color = rgba(26, 27, 38, 1.0) # #1a1b26
}

animations {
    enabled = false
}

input-field {
    monitor =
    size = 600, 100
    position = 0, 0
    halign = center
    valign = center

    inner_color = rgba(26, 27, 38, 0.8)    # #1a1b26
    outer_color = rgba(122, 162, 247, 1.0) # #7aa2f7 (blue)
    outline_thickness = 4

    font_family = CaskaydiaMono Nerd Font
    font_size = 32
    font_color = rgba(192, 202, 245, 1.0)  # #c0caf5 (fg)

    placeholder_color = rgba(192, 202, 245, 0.6)
    placeholder_text = Enter Password
    check_color = rgba(158, 206, 106, 1.0) # #9ece6a (green)
    fail_color = rgba(247, 118, 142, 1.0)  # #f7768e (red)
    fail_text = Wrong

    rounding = 0
    shadow_passes = 0
    fade_on_empty = false
}
